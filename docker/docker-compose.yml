version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: warroom-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: warroom
      POSTGRES_USER: warroom
      POSTGRES_PASSWORD: warroom
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - warroom-bridge

  redis:
    image: redis:7-alpine
    container_name: warroom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - warroom-bridge

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: warroom-backend
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://warroom-postgres:5432/warroom
      DB_USERNAME: warroom
      DB_PASSWORD: warroom
      REDIS_HOST: warroom-redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped
    networks:
      - warroom-bridge

networks:
  warroom-bridge:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
