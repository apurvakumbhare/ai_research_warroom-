server:
  port: 8080

spring:
  application:
     name: ai-research-war-room

  cloud:
    gcp:
      firestore:
        project-id: ai-war-room
        credentials:
          location: ${FIREBASE_CREDENTIALS:file:service-account.json}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api}
      chat:
        options:
          model: openai/gpt-4o-mini
          temperature: 0.7
          max-tokens: 1000

# Multi-model AI keys (loaded from .env)
warroom:
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: gemini-2.5-flash
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      model: claude-3-5-sonnet-20241022
    groq:
      api-key: ${GROQ_API_KEY}
      model: llama-3.3-70b-versatile
    debate:
      max-rounds: 3
      agent-timeout-seconds: 45

firebase:
  api-key: ${FIREBASE_API_KEY:AIzaSyBfxMGcCCOhpMXVMAft6ShnfR4gPjKzDUY}

logging:
  level:
    root: INFO
    com.warroom: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
